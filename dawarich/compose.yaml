name: dawarich

services:
    dawarich_redis:
        image: redis:7.4-alpine
        container_name: dawarich_redis
        command: >
            redis-server --save 900 1 --save 300 10 --appendonly no
        networks:
            - dawarich_network
        volumes:
            - /DATA/AppData/dawarich/shared:/data
        restart: always
        healthcheck:
            test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
            interval: 10s
            retries: 5
            start_period: 30s
            timeout: 10s

    dawarich_db:
        image: postgis/postgis:17-3.5-alpine
        shm_size: 1G
        container_name: dawarich_db
        volumes:
            - /DATA/AppData/dawarich/db_data:/var/lib/postgresql/data
            - /DATA/AppData/dawarich/shared:/var/shared
        networks:
            - dawarich_network
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
            POSTGRES_DB: ${POSTGRES_DB:-dawarich_development}
        restart: always
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dawarich_development}" ]
            interval: 10s
            retries: 5
            start_period: 30s
            timeout: 10s

    dawarich_app:
        image: freikin/dawarich:latest
        container_name: dawarich_app
        volumes:
            - /DATA/AppData/dawarich/public:/var/app/public
            - /DATA/AppData/dawarich/watched:/var/app/tmp/imports/watched
            - /DATA/AppData/dawarich/storage:/var/app/storage
            - /DATA/AppData/dawarich/db_data:/dawarich_db_data
        networks:
            dawarich_network:
            immich_network:
            newt_public:
                ipv4_address: 10.5.1.6
                ipv6_address: fd25:5000:1000:1::6
        ports:
            - "${DAWARICH_APP_PORT:-3000}:3000"
        stdin_open: true
        tty: true
        entrypoint: web-entrypoint.sh
        command: [ 'bin/rails', 'server', '-p', '3000', '-b', '::' ]
        restart: on-failure
        environment:
            RAILS_ENV: ${RAILS_ENV:-production}
            REDIS_URL: ${REDIS_URL:-redis://dawarich_redis:6379}
            DATABASE_HOST: ${DATABASE_HOST:-dawarich_db}
            DATABASE_PORT: ${DATABASE_PORT:-5432}
            DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
            DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password}
            DATABASE_NAME: ${DATABASE_NAME:-dawarich_development}
            APPLICATION_HOSTS: ${APPLICATION_HOSTS:-localhost,::1,127.0.0.1}
            TIME_ZONE: ${TIME_ZONE:-America/Sao_Paulo}
            APPLICATION_PROTOCOL: ${APPLICATION_PROTOCOL:-http}
            GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY}
            PROMETHEUS_EXPORTER_ENABLED: ${PROMETHEUS_EXPORTER_ENABLED:-false}
            SECRET_KEY_BASE: ${SECRET_KEY_BASE:-"CHANGE_ME"}
            RAILS_LOG_TO_STDOUT: ${RAILS_LOG_TO_STDOUT:-true}
            SELF_HOSTED: ${SELF_HOSTED:-true}
            STORE_GEODATA: ${STORE_GEODATA:-true}
            DISTANCE_UNIT: ${DISTANCE_UNIT:-km}
            MIN_MINUTES_SPENT_IN_CITY: ${MIN_MINUTES_SPENT_IN_CITY:-30}
            WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
        logging:
            driver: "json-file"
            options:
                max-size: ${LOG_MAX_SIZE:-100m}
                max-file: ${LOG_MAX_FILE:-5}
        healthcheck:
            test: [ "CMD-SHELL", "wget -qO - http://127.0.0.1:3000/api/v1/health | grep -q '\"status\"\\s*:\\s*\"ok\"'" ]
            interval: 10s
            retries: 30
            start_period: 30s
            timeout: 10s
        depends_on:
            dawarich_db:
                condition: service_healthy
                restart: true
            dawarich_redis:
                condition: service_healthy
                restart: true
        deploy:
            resources:
                limits:
                    cpus: ${APP_CPU_LIMIT:-0.50}
                    memory: ${APP_MEMORY_LIMIT:-4G}

    dawarich_sidekiq:
        image: freikin/dawarich:latest
        container_name: dawarich_sidekiq
        volumes:
            - /DATA/AppData/dawarich/public:/var/app/public
            - /DATA/AppData/dawarich/watched:/var/app/tmp/imports/watched
            - /DATA/AppData/dawarich/storage:/var/app/storage
        networks:
            - dawarich_network
        stdin_open: true
        tty: true
        entrypoint: sidekiq-entrypoint.sh
        command: [ 'sidekiq' ]
        restart: on-failure
        environment:
            RAILS_ENV: ${RAILS_ENV:-production}
            REDIS_URL: ${REDIS_URL:-redis://dawarich_redis:6379}
            DATABASE_HOST: ${DATABASE_HOST:-dawarich_db}
            DATABASE_PORT: ${DATABASE_PORT:-5432}
            DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
            DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password}
            DATABASE_NAME: ${DATABASE_NAME:-dawarich_development}
            APPLICATION_HOSTS: ${APPLICATION_HOSTS:-localhost,::1,127.0.0.1}
            BACKGROUND_PROCESSING_CONCURRENCY: ${BACKGROUND_PROCESSING_CONCURRENCY:-5}
            APPLICATION_PROTOCOL: ${APPLICATION_PROTOCOL:-http}
            GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY}
            PROMETHEUS_EXPORTER_ENABLED: ${PROMETHEUS_EXPORTER_ENABLED:-false}
            SECRET_KEY_BASE: ${SECRET_KEY_BASE:-"CHANGE_ME"}
            RAILS_LOG_TO_STDOUT: ${RAILS_LOG_TO_STDOUT:-true}
            SELF_HOSTED: ${SELF_HOSTED:-true}
            STORE_GEODATA: ${STORE_GEODATA:-true}
        logging:
            driver: "json-file"
            options:
                max-size: ${LOG_MAX_SIZE:-100m}
                max-file: ${LOG_MAX_FILE:-5}
        healthcheck:
            test: [ "CMD-SHELL", "pgrep -f sidekiq" ]
            interval: 10s
            retries: 30
            start_period: 30s
            timeout: 10s
        depends_on:
            dawarich_db:
                condition: service_healthy
                restart: true
            dawarich_redis:
                condition: service_healthy
                restart: true
            dawarich_app:
                condition: service_healthy
                restart: true

networks:
    dawarich_network:
        driver: bridge
        name: dawarich_network
        enable_ipv6: true
        ipam:
            driver: default
            config:
                - subnet: 10.70.0.0/24
                - subnet: fd25:7000:1000:1::/64
    immich_network:
        external: true
    newt_public:
        external: true
    