name: jellyfin

services:
    jellyfin:
        container_name: jellyfin
        devices:
            - /dev/dri:/dev/dri
        environment:
            DOCKER_MODS: linuxserver/mods:jellyfin-opencl-intel
            PGID: "1000"
            PUID: "1000"
            TZ: America/Sao_Paulo
        hostname: jellyfin
        image: linuxserver/jellyfin:10.11.8
        ports:
            - "8096:8096/tcp"
            - "8920:8920/tcp"
            - "7359:7359/udp"
        restart: unless-stopped
        volumes:
            - type: bind
              source: /DATA/AppData/jellyfin/config
              target: /config
            - type: bind
              source: /DATA/Media
              target: /Media
        networks:
            servarr:
                ipv4_address: 172.10.0.20
            newt_public:
                ipv4_address: 10.5.1.3
                ipv6_address: fd25:5000:1000:1::3

networks:
    servarr:
        external: true
    newt_public:
        external: true