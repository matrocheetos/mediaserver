name: notify

services:
    apprise:
        image: caronc/apprise:latest
        container_name: apprise
        ports:
            - "2210:8000"
        environment:
            TZ: "America/Sao_Paulo"
            APPRISE_STATEFUL_MODE: simple
            APPRISE_WORKER_COUNT: 1
            APPRISE_ADMIN: "y"
        volumes:
            - /DATA/AppData/apprise/config:/config
            - /DATA/AppData/apprise/attach:/attach
        restart: unless-stopped
        healthcheck:
            test:
                [
                "CMD-SHELL",
                "curl -fsS http://172.17.0.1:2210/status >/dev/null || exit 1",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s

    ntfy:
        image: binwiederhier/ntfy:latest
        container_name: ntfy
        command:
            - serve
        environment:
            TZ: "America/Sao_Paulo"
            NTFY_BASE_URL: ${NTFY_BASE_URL}
            NTFY_LISTEN_HTTP: "10.5.1.211:80"
            NTFY_CACHE_FILE: "/var/cache/ntfy/cache.db"
            NTFY_CACHE_DURATION: "24h"
            NTFY_BEHIND_PROXY: "true"
            NTFY_PROXY_TRUSTED_HOSTS: "10.5.1.2"
            NTFY_ATTACHMENT_CACHE_DIR: "/var/cache/ntfy/attachments"
            NTFY_ATTACHMENT_TOTAL_SIZE_LIMIT: "1G"
            NTFY_ATTACHMENT_FILE_SIZE_LIMIT: "10M"
            NTFY_ATTACHMENT_EXPIRY_DURATION: "24h"
            NTFY_AUTH_FILE: "/etc/ntfy/auth.db"
            NTFY_ENABLE_SIGNUP: "false"
            NTFY_REQUIRE_LOGIN: "true"
            NTFY_ENABLE_LOGIN: "true"
        user: 1000:1000
        volumes:
            - /DATA/AppData/ntfy/cache:/var/cache/ntfy
            - /DATA/AppData/ntfy/config:/etc/ntfy
        ports:
            - 2211:80
        restart: unless-stopped
        init: true
        networks:
            newt_public:
                ipv4_address: 10.5.1.211
                ipv6_address: fd25:5000:1000:1::211

networks:
    newt_public:
        external: true