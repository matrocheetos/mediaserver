name: networking

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 8800:8800/tcp
      - 8443:8443/tcp
    environment:
      TZ: America/Sao_Paulo
      FTLCONF_webserver_port: '8800o,[::]:8800o,8443os,[::]:8443os'
      FTLCONF_webserver_api_password: ${WEBPASS}
      FTLCONF_dns_listeningMode: all
    volumes:
      - /DATA/AppData/pihole/etc/pihole:/etc/pihole
    cap_add:
      - SYS_NICE
    restart: unless-stopped
    networks:
      dns:
        ipv4_address: 172.20.0.129
        ipv6_address: fd25:1000:1000:100::129
      vpn:
        ipv4_address: 10.30.0.53
        ipv6_address: fd25:1000:1000:200::53

  unbound:
    container_name: unbound
    image: bigbeartechworld/big-bear-unbound:latest
    ports:
      - "5300:53/udp"
      - "5300:53/tcp"
    environment:
      TZ: America/Sao_Paulo
    #volumes:
    #  - /DATA/AppData/unbound/unbound.conf:/etc/unbound/unbound.conf:ro
    restart: unless-stopped
    networks:
      dns:
        ipv4_address: 172.20.0.130
        ipv6_address: fd25:1000:1000:100::130

  wg-easy:
    container_name: wg-easy
    image: ghcr.io/wg-easy/wg-easy:15
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    environment:
      INSECURE: "true"
      DISABLE_IPV6: "false"
      INIT_ENABLED: "true"
      INIT_USERNAME: ${WGUSER}
      INIT_PASSWORD: ${WGPASS}
      INIT_HOST: ${WGHOST}
      INIT_PORT: "51820"
      INIT_DNS: "10.30.0.53"
    volumes:
      - /DATA/AppData/wg-easy/wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped
    networks:
      vpn:
        ipv4_address: 10.30.0.30
        ipv6_address: fd25:1000:1000:200::30
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1

networks:
  dns:
    name: dns
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/24
        - subnet: fd25:1000:1000:100::/64
  vpn:
    name: vpn
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 10.30.0.0/24
        - subnet: fd25:1000:1000:200::/64