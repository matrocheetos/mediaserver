name: monitoring-web

services:
    changedetection:
        image: ghcr.io/dgtlmoon/changedetection.io:latest
        container_name: changedetection
        restart: unless-stopped
        ports:
            - "5000:5000"
        volumes:
            - /DATA/AppData/changedetection/data:/datastore
        environment:
            - PORT=5000
            - PUID=1000
            - PGID=1000
            - PLAYWRIGHT_DRIVER_URL=ws://changedetection-browser:3000/?stealth=1&--disable-web-security=true
        depends_on:
            - changedetection-browser
        networks:
            monitoring-web:
            notify:
            newt_public:
                ipv4_address: 10.5.1.7
                ipv6_address: fd25:5000:1000:1::7

    changedetection-browser:
        image: browserless/chrome:latest
        container_name: changedetection-browser
        restart: unless-stopped
        environment:
            - MAX_CONCURRENT_SESSIONS=10
            - CONNECTION_TIMEOUT=300000
            - KEEP_ALIVE=true
            - DEMO_MODE=false
        networks:
            - monitoring-web

    n8n:
        image: docker.n8n.io/n8nio/n8n
        container_name: n8n
        restart: unless-stopped
        environment:
            - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
            - N8N_HOST=${N8N_HOST}
            - N8N_PORT=5678
            - N8N_PROTOCOL=https
            - NODE_ENV=production
            - WEBHOOK_URL=https://${N8N_HOST}/
            - TZ=America/Sao_Paulo
            - GENERIC_TIMEZONE=America/Sao_Paulo
            - N8N_RESTRICT_FILE_ACCESS_TO=/files
            - N8N_PROXY_HOPS=1
        ports:
            - "5678:5678"
        volumes:
            - /DATA/AppData/n8n/data:/home/node/.n8n
            - /DATA/AppData/n8n/files:/files
        networks:
            monitoring-web:
            notify:
            newt_public:
                ipv4_address: 10.5.1.8
                ipv6_address: fd25:5000:1000:1::8

    telegram-monitor:
        image: ghcr.io/matrocheetos/telegram-monitor:latest
        container_name: telegram-monitor
        restart: unless-stopped
        volumes:
            - /DATA/AppData/telegram-monitor/session:/app/session
        environment:
            - API_ID=${TELEGRAM_API_ID}
            - API_HASH=${TELEGRAM_API_HASH}
            - WEBHOOK_URL=${TELEGRAM_MONITOR_WEBHOOK}
            - MONITORED_CHATS=${TELEGRAM_MONITOR_CHATS}
            - AUTH_JWT_SECRET=${N8N_JWT_SECRET}
            - AUTH_JWT_ALGORITHM=${N8N_JWT_ALGORITHM}
        networks:
            monitoring-web:
                ipv4_address: 10.80.1.5
                ipv6_address: fd25:8000:1000:1::5

networks:
    monitoring-web:
        name: monitoring-web
        driver: bridge
        enable_ipv6: true
        ipam:
            driver: default
            config:
                - subnet: 10.80.1.0/24
                - subnet: fd25:8000:1000:1::/64
    newt_public:
        external: true
    notify:
        external: true
